<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Sign-up Form</title>
	<!-- Links -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Playpen+Sans:wght@100..800&family=Pliant:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<div id="main-container">
		
		<div class="img-container">
			<div>
				<img id="odin-logo" src="img/odin-logo.png">
				<p id="odin-word">ODIN</p>
			</div>
			<p id="credit">Photo by <a href="https://unsplash.com/@haliewestphoto">Halie West</a> on <a href="https://unsplash.com/photos/green-leaf-plant-in-close-up-photography-25xggax4bSA">Unsplash</a></p>
		</div>
		<div class="form-container">
			<div class="form-header">
				<h1>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. Sign up <i>now</i> to get started.</h1>
				<h1>You <i>know</i> you want to.</h1>
			</div>
			<div>
				<form action="" method="post">
					<fieldset>
						<h2>Let's do this!</h2>
						<div>
							<div class="input-group">
								<label for="first-name">FIRST NAME</label>
								<input id="first-name" type="text">
							</div>
							<div class="input-group">
								<label for="last-name">LAST NAME</label>
								<input id="last-name" type="text">
							</div>
							<div class="input-group">
								<label for="email">EMAIL</label>
								<input id="email" type="email">
							</div>
							<div class="input-group">
								<label for="tel" >PHONE NUMBER</label>
								<input id="tel" type="tel">
							</div>
							<div class="input-group">
								<label for="password">PASSWORD</label>
								<input id="password"  type="password">
							</div>
							<div class="input-group">
								<label for="confirm-password">CONFIRM PASSWORD</label>
								<input id="confirm-password" type="password">
							</div>
						</div>
					</fieldset>
					<button type="submit">Create Account</button>
					<p>Already have an account? <a href="#">Log in</a></p>
				</form>
			</div>
		</div>
	</div>
</body>
</html>
